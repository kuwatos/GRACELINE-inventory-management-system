version: '3.8'

services:
  # 1. The Database Service
  db:
    image: postgres:14
    container_name: graceline_db_container
    environment:
      - POSTGRES_USER=graceline_user
      - POSTGRES_PASSWORD=graceline123
      - POSTGRES_DB=graceline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - graceline-network

  # 2. The Dashboard Service (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: graceline_pguser_container
    environment:
      - PGADMIN_DEFAULT_EMAIL=user@user.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - graceline-network

# Define the shared network
networks:
  graceline-network:

# Define the data persistence
volumes:
  postgres_data: